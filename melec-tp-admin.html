<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MELEC — Gestion TPs & Systèmes</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0d1117;
    --bg2: #161b24;
    --bg3: #1e2635;
    --border: #2a3347;
    --border2: #3a4a66;
    --accent: #3b82f6;
    --accent2: #60a5fa;
    --green: #22c55e;
    --orange: #f59e0b;
    --red: #ef4444;
    --purple: #a78bfa;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --radius: 10px;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --display: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { height: 100%; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: var(--display);
    font-weight: 800;
    font-size: 15px;
    color: var(--accent2);
    letter-spacing: 0.05em;
  }
  .logo span { color: var(--text3); font-weight: 600; }
  .header-tabs { display: flex; gap: 2px; margin-left: 20px; }
  .htab {
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    color: var(--text2);
    border: none;
    background: none;
    transition: all 0.15s;
  }
  .htab:hover { background: var(--bg3); color: var(--text); }
  .htab.active { background: var(--accent); color: #fff; }
  .header-right { margin-left: auto; display: flex; gap: 10px; align-items: center; }
  .gist-status { font-size: 11px; font-family: var(--mono); color: var(--text3); }
  .gist-status.ok::before { content: "● "; color: var(--green); }
  .gist-status.err::before { content: "● "; color: var(--red); }
  .gist-status.loading::before { content: "◌ "; color: var(--orange); }
  .btn {
    padding: 7px 14px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    font-family: var(--sans);
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #2563eb; }
  .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--bg3); color: var(--text); }
  .btn-danger { background: transparent; color: var(--red); border: 1px solid #3f1a1a; }
  .btn-danger:hover { background: #1f0a0a; }
  .btn-green { background: var(--green); color: #fff; }
  .btn-green:hover { background: #16a34a; }
  .btn-sm { padding: 4px 10px; font-size: 11px; }

  /* LAYOUT */
  .main { flex: 1; display: flex; overflow: hidden; height: calc(100vh - 56px); }
  .sidebar {
    width: 280px;
    border-right: 1px solid var(--border);
    background: var(--bg2);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .sidebar-title { font-family: var(--display); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text2); }
  .sidebar-list { flex: 1; overflow-y: auto; padding: 8px; }
  .list-item {
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid transparent;
    margin-bottom: 2px;
    transition: all 0.12s;
    position: relative;
  }
  .list-item:hover { background: var(--bg3); }
  .list-item.active { background: #1a2540; border-color: var(--accent); }
  .list-item-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .list-item-meta { font-size: 11px; color: var(--text3); margin-top: 2px; font-family: var(--mono); }
  .list-item-badge {
    position: absolute;
    top: 10px; right: 10px;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    font-family: var(--mono);
  }
  .badge-green { background: #14231a; color: var(--green); }
  .badge-blue { background: #111f3a; color: var(--accent2); }
  .badge-orange { background: #251a0a; color: var(--orange); }
  .badge-purple { background: #1e1632; color: var(--purple); }

  /* CONTENT */
  .content { flex: 1; overflow-y: auto; padding: 24px; }
  .empty-state {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text3);
  }
  .empty-icon { font-size: 48px; opacity: 0.4; }
  .empty-text { font-size: 14px; }

  /* FORM */
  .form-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 16px;
  }
  .form-card-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg3);
  }
  .form-card-title { font-family: var(--display); font-size: 13px; font-weight: 700; color: var(--text); }
  .form-card-body { padding: 18px; display: flex; flex-direction: column; gap: 14px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text2); }
  input[type=text], input[type=url], textarea, select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 12px;
    color: var(--text);
    font-size: 13px;
    font-family: var(--sans);
    transition: border-color 0.15s;
    width: 100%;
  }
  input[type=text]:focus, input[type=url]:focus, textarea:focus, select:focus {
    outline: none;
    border-color: var(--accent);
  }
  textarea { resize: vertical; min-height: 80px; }
  select option { background: var(--bg2); }

  /* CHECKBOX GROUP */
  .checkbox-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .checkbox-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.12s;
    user-select: none;
  }
  .checkbox-item input { display: none; }
  .checkbox-item.checked { background: #111f3a; border-color: var(--accent); color: var(--accent2); }
  .checkbox-item .check-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--border2);
    transition: background 0.12s;
  }
  .checkbox-item.checked .check-dot { background: var(--accent); }

  /* SYSTEMES LIST IN TP */
  .sys-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text2);
    margin: 2px;
  }
  .sys-tag .remove { cursor: pointer; color: var(--text3); font-size: 13px; line-height: 1; }
  .sys-tag .remove:hover { color: var(--red); }
  .tags-input-wrap {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 8px;
    min-height: 42px;
    display: flex;
    flex-wrap: wrap;
    align-items: flex-start;
    gap: 4px;
    cursor: text;
  }
  .tags-input-wrap:focus-within { border-color: var(--accent); }
  .tags-input-wrap select {
    border: none;
    background: transparent;
    padding: 2px 4px;
    font-size: 12px;
    color: var(--text2);
    flex: 1;
    min-width: 100px;
  }

  /* RESSOURCES */
  .ressource-row {
    display: grid;
    grid-template-columns: 100px 1fr auto auto;
    gap: 8px;
    align-items: center;
    padding: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .ressource-list { display: flex; flex-direction: column; gap: 6px; }
  .icon-btn {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
    font-size: 14px;
    line-height: 1;
  }
  .icon-btn:hover { color: var(--red); background: #1f0a0a; }

  /* DETAIL HEADER */
  .detail-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 20px;
    gap: 16px;
  }
  .detail-title {
    font-family: var(--display);
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    line-height: 1.2;
  }
  .detail-id {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    margin-top: 4px;
  }
  .action-row { display: flex; gap: 8px; flex-shrink: 0; }

  /* QR */
  .qr-section {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 16px;
  }
  #qr-canvas { border-radius: 6px; background: #fff; }
  .qr-info { flex: 1; }
  .qr-url {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
    background: var(--bg);
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    word-break: break-all;
    margin-bottom: 10px;
  }

  /* CONFIG */
  .config-section {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }
  .config-title { font-family: var(--display); font-size: 13px; font-weight: 700; margin-bottom: 14px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; }

  /* TOAST */
  #toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 18px;
    font-size: 13px;
    color: var(--text);
    z-index: 999;
    display: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  #toast.show { display: block; }
  #toast.success { border-color: var(--green); }
  #toast.error { border-color: var(--red); }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 12px;
    width: 520px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    padding: 24px;
  }
  .modal-title { font-family: var(--display); font-size: 17px; font-weight: 700; margin-bottom: 18px; }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }

  /* STATS PILL */
  .stats-row { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .stat-pill {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    text-align: center;
  }
  .stat-val { font-family: var(--display); font-size: 22px; font-weight: 800; color: var(--accent2); }
  .stat-lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  .sep { border: none; border-top: 1px solid var(--border); margin: 4px 0; }
  .text-muted { color: var(--text3); font-size: 12px; }
  .mt8 { margin-top: 8px; }
  .flex-end { display: flex; justify-content: flex-end; gap: 8px; }

  /* PRINT */
  @media print {
    body { background: white; }
    header, .sidebar, .action-row { display: none !important; }
    .qr-section { border: 1px solid #ccc; }
    #qr-canvas { border: 1px solid #ddd; }
    .content { padding: 0; }
    .form-card { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">MELEC <span>/ Admin TP</span></div>
  <div class="header-tabs">
    <button class="htab active" onclick="switchTab('systemes')">🖥️ Systèmes</button>
    <button class="htab" onclick="switchTab('tps')">🔬 TPs</button>
    <button class="htab" onclick="switchTab('config')">⚙️ Config</button>
  </div>
  <div class="header-right">
    <span class="gist-status loading" id="gist-status">non connecté</span>
    <button class="btn btn-ghost btn-sm" onclick="syncGist()">↑ Sauvegarder</button>
  </div>
</header>

<div class="main">

  <!-- SIDEBAR SYSTEMES -->
  <div class="sidebar" id="sidebar-systemes">
    <div class="sidebar-header">
      <span class="sidebar-title">Systèmes</span>
      <button class="btn btn-primary btn-sm" onclick="newSysteme()">+ Nouveau</button>
    </div>
    <div class="sidebar-list" id="list-systemes"></div>
  </div>

  <!-- SIDEBAR TPS -->
  <div class="sidebar" id="sidebar-tps" style="display:none">
    <div class="sidebar-header">
      <span class="sidebar-title">TPs</span>
      <button class="btn btn-primary btn-sm" onclick="newTP()">+ Nouveau</button>
    </div>
    <div class="sidebar-list" id="list-tps"></div>
  </div>

  <!-- CONTENT -->
  <div class="content" id="content">
    <div class="empty-state">
      <div class="empty-icon">🔌</div>
      <div class="empty-text">Sélectionnez un élément ou créez-en un nouveau</div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- MODAL CONFIG -->
<div class="modal-overlay" id="modal-config">
  <div class="modal">
    <div class="modal-title">⚙️ Configuration Gist</div>
    <div style="display:flex;flex-direction:column;gap:12px;">
      <div class="form-group">
        <label>Token GitHub (Personal Access Token)</label>
        <input type="text" id="cfg-token" placeholder="ghp_xxxxxxxxxxxx">
        <div class="text-muted mt8">Permissions requises : <code>gist</code> (read + write)</div>
      </div>
      <div class="form-group">
        <label>ID du Gist</label>
        <input type="text" id="cfg-gist-id" placeholder="abc123def456...">
      </div>
      <div class="form-group">
        <label>URL de base de l'app élève</label>
        <input type="text" id="cfg-app-url" placeholder="https://exemple.github.io/melec-eleve.html">
        <div class="text-muted mt8">Le QR code sera généré avec : [URL]?sys=[ID_SYSTEME]</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-config')">Annuler</button>
      <button class="btn btn-primary" onclick="saveConfig()">Enregistrer</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
// ============================================================
// STATE
// ============================================================
let state = {
  systemes: [],
  tps: [],
  currentTab: 'systemes',
  selectedSysteme: null,
  selectedTP: null,
  dirty: false
};

let config = {
  token: '',
  gistId: '',
  appUrl: ''
};

// ============================================================
// INIT
// ============================================================
function init() {
  // Load config from localStorage
  const saved = localStorage.getItem('melec_tp_config');
  if (saved) {
    config = JSON.parse(saved);
    document.getElementById('cfg-token').value = config.token || '';
    document.getElementById('cfg-gist-id').value = config.gistId || '';
    document.getElementById('cfg-app-url').value = config.appUrl || '';
  }

  // Load local data
  const localData = localStorage.getItem('melec_tp_data');
  if (localData) {
    const d = JSON.parse(localData);
    state.systemes = d.systemes || [];
    state.tps = d.tps || [];
  }

  renderSidebars();

  // Try to connect to Gist
  if (config.token && config.gistId) {
    loadGist();
  } else {
    setGistStatus('err', 'Config manquante');
  }
}

// ============================================================
// TABS
// ============================================================
function switchTab(tab) {
  state.currentTab = tab;
  document.querySelectorAll('.htab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.htab')[['systemes','tps','config'].indexOf(tab)].classList.add('active');

  document.getElementById('sidebar-systemes').style.display = tab === 'systemes' ? 'flex' : 'none';
  document.getElementById('sidebar-tps').style.display = tab === 'tps' ? 'flex' : 'none';

  if (tab === 'config') {
    showConfigPanel();
  } else {
    showEmpty();
  }
}

// ============================================================
// GIST
// ============================================================
function setGistStatus(status, msg) {
  const el = document.getElementById('gist-status');
  el.className = 'gist-status ' + status;
  el.textContent = msg;
}

async function loadGist() {
  setGistStatus('loading', 'Connexion...');
  try {
    const res = await fetch(`https://api.github.com/gists/${config.gistId}`, {
      headers: { Authorization: `token ${config.token}` }
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    if (data.files['systemes.json']) {
      state.systemes = JSON.parse(data.files['systemes.json'].content);
    }
    if (data.files['tps.json']) {
      state.tps = JSON.parse(data.files['tps.json'].content);
    }
    setGistStatus('ok', 'Connecté');
    saveLocal();
    renderSidebars();
    toast('Données chargées depuis GitHub', 'success');
  } catch(e) {
    setGistStatus('err', 'Erreur: ' + e.message);
    toast('Impossible de charger le Gist : ' + e.message, 'error');
  }
}

async function syncGist() {
  if (!config.token || !config.gistId) {
    toast('Configurez le Gist d\'abord (onglet Config)', 'error');
    return;
  }
  setGistStatus('loading', 'Sauvegarde...');
  try {
    const res = await fetch(`https://api.github.com/gists/${config.gistId}`, {
      method: 'PATCH',
      headers: {
        Authorization: `token ${config.token}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        files: {
          'systemes.json': { content: JSON.stringify(state.systemes, null, 2) },
          'tps.json': { content: JSON.stringify(state.tps, null, 2) }
        }
      })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    setGistStatus('ok', 'Sauvegardé');
    state.dirty = false;
    saveLocal();
    toast('Sauvegardé sur GitHub ✓', 'success');
  } catch(e) {
    setGistStatus('err', 'Erreur sync');
    toast('Erreur de sauvegarde : ' + e.message, 'error');
  }
}

function saveLocal() {
  localStorage.setItem('melec_tp_data', JSON.stringify({ systemes: state.systemes, tps: state.tps }));
}

function markDirty() {
  state.dirty = true;
  saveLocal();
}

// ============================================================
// IDs
// ============================================================
function genId(prefix) {
  return prefix + Date.now().toString(36).toUpperCase();
}

// ============================================================
// RENDER SIDEBARS
// ============================================================
function renderSidebars() {
  // Systèmes
  const ls = document.getElementById('list-systemes');
  ls.innerHTML = '';
  state.systemes.forEach(s => {
    const tpCount = state.tps.filter(t => t.systemes && t.systemes.includes(s.id)).length;
    const div = document.createElement('div');
    div.className = 'list-item' + (state.selectedSysteme === s.id ? ' active' : '');
    div.innerHTML = `
      <div class="list-item-name">${s.nom || '(sans nom)'}</div>
      <div class="list-item-meta">${s.id}</div>
      <span class="list-item-badge badge-blue">${tpCount} TP${tpCount>1?'s':''}</span>
    `;
    div.onclick = () => selectSysteme(s.id);
    ls.appendChild(div);
  });
  if (!state.systemes.length) {
    ls.innerHTML = '<div style="padding:16px;color:var(--text3);font-size:12px;text-align:center;">Aucun système</div>';
  }

  // TPs
  const lt = document.getElementById('list-tps');
  lt.innerHTML = '';
  state.tps.forEach(tp => {
    const niveaux = (tp.niveaux || []).join(', ');
    const div = document.createElement('div');
    div.className = 'list-item' + (state.selectedTP === tp.id ? ' active' : '');
    div.innerHTML = `
      <div class="list-item-name">${tp.titre || '(sans titre)'}</div>
      <div class="list-item-meta">${tp.id} · ${niveaux}</div>
      <span class="list-item-badge badge-purple">${(tp.ressources||[]).length} res.</span>
    `;
    div.onclick = () => selectTP(tp.id);
    lt.appendChild(div);
  });
  if (!state.tps.length) {
    lt.innerHTML = '<div style="padding:16px;color:var(--text3);font-size:12px;text-align:center;">Aucun TP</div>';
  }
}

// ============================================================
// SYSTEMES
// ============================================================
function newSysteme() {
  const s = {
    id: genId('SYS'),
    nom: '',
    description: '',
    localisation: '',
    image_url: ''
  };
  state.systemes.push(s);
  state.selectedSysteme = s.id;
  markDirty();
  renderSidebars();
  showSystemeForm(s.id);
}

function selectSysteme(id) {
  state.selectedSysteme = id;
  renderSidebars();
  showSystemeForm(id);
}

function showSystemeForm(id) {
  const s = state.systemes.find(x => x.id === id);
  if (!s) return;

  const tpCount = state.tps.filter(t => (t.systemes||[]).includes(id)).length;
  const appUrl = config.appUrl || 'https://[app-eleve-url]';
  const qrUrl = `${appUrl}?sys=${id}`;

  document.getElementById('content').innerHTML = `
    <div class="detail-header">
      <div>
        <div class="detail-title" id="sys-title-disp">${s.nom || 'Nouveau système'}</div>
        <div class="detail-id">${s.id}</div>
      </div>
      <div class="action-row">
        <button class="btn btn-ghost btn-sm" onclick="saveSysteme('${id}')">💾 Enregistrer</button>
        <button class="btn btn-danger btn-sm" onclick="deleteSysteme('${id}')">Supprimer</button>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-pill"><div class="stat-val">${tpCount}</div><div class="stat-lbl">TPs liés</div></div>
      <div class="stat-pill"><div class="stat-val">${(s.localisation||'—')}</div><div class="stat-lbl">Armoire</div></div>
    </div>

    <!-- QR CODE -->
    <div class="qr-section">
      <div>
        <canvas id="qr-canvas" width="120" height="120"></canvas>
      </div>
      <div class="qr-info">
        <div style="font-family:var(--display);font-size:13px;font-weight:700;margin-bottom:8px;">QR Code système</div>
        <div class="qr-url">${qrUrl}</div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-ghost btn-sm" onclick="copyUrl('${qrUrl}')">Copier l'URL</button>
          <button class="btn btn-ghost btn-sm" onclick="window.print()">🖨️ Imprimer</button>
        </div>
      </div>
    </div>

    <div class="form-card">
      <div class="form-card-header">
        <span>🖥️</span>
        <span class="form-card-title">Informations du système</span>
      </div>
      <div class="form-card-body">
        <div class="form-row">
          <div class="form-group">
            <label>Nom du système</label>
            <input type="text" id="sys-nom" value="${esc(s.nom)}" placeholder="Ex: Maquette domotique BTS">
          </div>
          <div class="form-group">
            <label>Localisation / Armoire</label>
            <input type="text" id="sys-loc" value="${esc(s.localisation)}" placeholder="Ex: Armoire B3">
          </div>
        </div>
        <div class="form-group full">
          <label>Description</label>
          <textarea id="sys-desc" placeholder="Description du système...">${esc(s.description)}</textarea>
        </div>
        <div class="form-group full">
          <label>URL image (optionnel)</label>
          <input type="url" id="sys-img" value="${esc(s.image_url||'')}" placeholder="https://...">
        </div>
      </div>
    </div>

    <div class="form-card">
      <div class="form-card-header">
        <span>🔬</span>
        <span class="form-card-title">TPs rattachés à ce système</span>
      </div>
      <div class="form-card-body" id="sys-tps-list">
        ${renderSystemeTPs(id)}
      </div>
    </div>

    <div class="flex-end">
      <button class="btn btn-primary" onclick="saveSysteme('${id}')">💾 Enregistrer les modifications</button>
    </div>
  `;

  // Generate QR
  setTimeout(() => {
    try {
      const canvas = document.getElementById('qr-canvas');
      QRCode.toCanvas(canvas, qrUrl, { width: 120, margin: 1, color: { dark: '#000000', light: '#ffffff' } });
    } catch(e) {}
  }, 50);
}

function renderSystemeTPs(sysId) {
  const linked = state.tps.filter(t => (t.systemes||[]).includes(sysId));
  if (!linked.length) return '<div class="text-muted">Aucun TP lié. Créez des TPs dans l\'onglet TPs et associez-les à ce système.</div>';
  return linked.map(tp => `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;">
      <div>
        <div style="font-size:13px;font-weight:500;">${esc(tp.titre)}</div>
        <div style="font-size:11px;color:var(--text3);font-family:var(--mono);">${tp.id} · ${(tp.niveaux||[]).join(', ')}</div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="switchTab('tps');selectTP('${tp.id}')">Ouvrir →</button>
    </div>
  `).join('');
}

function saveSysteme(id) {
  const s = state.systemes.find(x => x.id === id);
  if (!s) return;
  s.nom = document.getElementById('sys-nom').value;
  s.localisation = document.getElementById('sys-loc').value;
  s.description = document.getElementById('sys-desc').value;
  s.image_url = document.getElementById('sys-img').value;
  markDirty();
  renderSidebars();
  document.getElementById('sys-title-disp').textContent = s.nom || 'Nouveau système';
  toast('Système sauvegardé localement', 'success');
}

function deleteSysteme(id) {
  if (!confirm('Supprimer ce système ? Les TPs liés ne seront pas supprimés.')) return;
  state.systemes = state.systemes.filter(x => x.id !== id);
  // Remove from TPs
  state.tps.forEach(tp => {
    tp.systemes = (tp.systemes||[]).filter(s => s !== id);
  });
  state.selectedSysteme = null;
  markDirty();
  renderSidebars();
  showEmpty();
  toast('Système supprimé', 'success');
}

// ============================================================
// TPs
// ============================================================
function newTP() {
  const tp = {
    id: genId('TP'),
    titre: '',
    description: '',
    objectifs: '',
    niveaux: [],
    systemes: [],
    duree_min: 60,
    ressources: []
  };
  state.tps.push(tp);
  state.selectedTP = tp.id;
  markDirty();
  renderSidebars();
  showTPForm(tp.id);
}

function selectTP(id) {
  state.selectedTP = id;
  switchTab('tps');
  renderSidebars();
  showTPForm(id);
}

function showTPForm(id) {
  const tp = state.tps.find(x => x.id === id);
  if (!tp) return;
  const niveaux = ['2nde', '1ère', 'Terminale'];

  document.getElementById('content').innerHTML = `
    <div class="detail-header">
      <div>
        <div class="detail-title">${esc(tp.titre) || 'Nouveau TP'}</div>
        <div class="detail-id">${tp.id}</div>
      </div>
      <div class="action-row">
        <button class="btn btn-ghost btn-sm" onclick="saveTP('${id}')">💾 Enregistrer</button>
        <button class="btn btn-danger btn-sm" onclick="deleteTP('${id}')">Supprimer</button>
      </div>
    </div>

    <div class="form-card">
      <div class="form-card-header"><span>🔬</span><span class="form-card-title">Informations du TP</span></div>
      <div class="form-card-body">
        <div class="form-row">
          <div class="form-group">
            <label>Titre du TP</label>
            <input type="text" id="tp-titre" value="${esc(tp.titre)}" placeholder="Ex: Câblage d'un circuit de puissance">
          </div>
          <div class="form-group">
            <label>Durée (minutes)</label>
            <input type="text" id="tp-duree" value="${tp.duree_min||60}" placeholder="60">
          </div>
        </div>
        <div class="form-group full">
          <label>Niveaux concernés</label>
          <div class="checkbox-group" id="niveaux-group">
            ${niveaux.map(n => `
              <label class="checkbox-item ${(tp.niveaux||[]).includes(n) ? 'checked' : ''}" onclick="toggleNiveau(this,'${n}')">
                <input type="checkbox" ${(tp.niveaux||[]).includes(n) ? 'checked' : ''}>
                <div class="check-dot"></div>
                ${n}
              </label>
            `).join('')}
          </div>
        </div>
        <div class="form-group full">
          <label>Systèmes didactiques associés</label>
          <div id="sys-tags-container" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;">
            ${(tp.systemes||[]).map(sid => {
              const s = state.systemes.find(x => x.id === sid);
              return `<span class="sys-tag">${esc(s?s.nom:sid)} <span class="remove" onclick="removeSysTag('${id}','${sid}')">×</span></span>`;
            }).join('')}
          </div>
          <select id="sys-add-select" onchange="addSysTag('${id}', this)">
            <option value="">+ Associer un système...</option>
            ${state.systemes.filter(s => !(tp.systemes||[]).includes(s.id)).map(s =>
              `<option value="${s.id}">${esc(s.nom)} (${s.id})</option>`
            ).join('')}
          </select>
        </div>
        <div class="form-group full">
          <label>Description</label>
          <textarea id="tp-desc" placeholder="Description du TP...">${esc(tp.description||'')}</textarea>
        </div>
        <div class="form-group full">
          <label>Objectifs pédagogiques</label>
          <textarea id="tp-obj" placeholder="Objectifs...">${esc(tp.objectifs||'')}</textarea>
        </div>
      </div>
    </div>

    <div class="form-card">
      <div class="form-card-header"><span>📄</span><span class="form-card-title">Ressources</span></div>
      <div class="form-card-body">
        <div class="ressource-list" id="ressource-list">
          ${(tp.ressources||[]).map((r,i) => renderRessource(r,i,id)).join('')}
        </div>
        <button class="btn btn-ghost btn-sm mt8" onclick="addRessource('${id}')">+ Ajouter une ressource</button>
      </div>
    </div>

    <div class="flex-end">
      <button class="btn btn-primary" onclick="saveTP('${id}')">💾 Enregistrer les modifications</button>
    </div>
  `;
}

function renderRessource(r, i, tpId) {
  return `
    <div class="ressource-row" id="res-row-${i}">
      <select id="res-type-${i}">
        <option value="pdf" ${r.type==='pdf'?'selected':''}>📄 PDF</option>
        <option value="video" ${r.type==='video'?'selected':''}>🎬 Vidéo</option>
        <option value="lien" ${r.type==='lien'?'selected':''}>🔗 Lien</option>
        <option value="image" ${r.type==='image'?'selected':''}>🖼️ Image</option>
      </select>
      <input type="text" id="res-titre-${i}" value="${esc(r.titre||'')}" placeholder="Titre de la ressource">
      <input type="url" id="res-url-${i}" value="${esc(r.url||'')}" placeholder="https://..." style="min-width:180px;">
      <button class="icon-btn" onclick="removeRessource('${tpId}',${i})">✕</button>
    </div>
  `;
}

function addRessource(tpId) {
  // Save current state first, then add
  saveTPSilent(tpId);
  const tp = state.tps.find(x => x.id === tpId);
  if (!tp) return;
  tp.ressources = tp.ressources || [];
  tp.ressources.push({ type: 'pdf', titre: '', url: '' });
  markDirty();
  showTPForm(tpId);
}

function removeRessource(tpId, idx) {
  saveTPSilent(tpId);
  const tp = state.tps.find(x => x.id === tpId);
  if (!tp) return;
  tp.ressources.splice(idx, 1);
  markDirty();
  showTPForm(tpId);
}

function toggleNiveau(el, niveau) {
  el.classList.toggle('checked');
}

function addSysTag(tpId, sel) {
  if (!sel.value) return;
  saveTPSilent(tpId);
  const tp = state.tps.find(x => x.id === tpId);
  if (!tp) return;
  tp.systemes = tp.systemes || [];
  if (!tp.systemes.includes(sel.value)) tp.systemes.push(sel.value);
  markDirty();
  showTPForm(tpId);
}

function removeSysTag(tpId, sysId) {
  const tp = state.tps.find(x => x.id === tpId);
  if (!tp) return;
  tp.systemes = (tp.systemes||[]).filter(s => s !== sysId);
  markDirty();
  showTPForm(tpId);
}

function saveTPSilent(id) {
  const tp = state.tps.find(x => x.id === id);
  if (!tp) return;
  if (document.getElementById('tp-titre')) {
    tp.titre = document.getElementById('tp-titre').value;
    tp.duree_min = parseInt(document.getElementById('tp-duree').value) || 60;
    tp.description = document.getElementById('tp-desc').value;
    tp.objectifs = document.getElementById('tp-obj').value;
    tp.niveaux = [...document.querySelectorAll('#niveaux-group .checkbox-item.checked')].map(el => el.textContent.trim());
    // Save ressources
    (tp.ressources||[]).forEach((r,i) => {
      const t = document.getElementById(`res-type-${i}`);
      const ti = document.getElementById(`res-titre-${i}`);
      const u = document.getElementById(`res-url-${i}`);
      if (t) r.type = t.value;
      if (ti) r.titre = ti.value;
      if (u) r.url = u.value;
    });
  }
}

function saveTP(id) {
  saveTPSilent(id);
  markDirty();
  renderSidebars();
  toast('TP sauvegardé localement', 'success');
}

function deleteTP(id) {
  if (!confirm('Supprimer ce TP ?')) return;
  state.tps = state.tps.filter(x => x.id !== id);
  state.selectedTP = null;
  markDirty();
  renderSidebars();
  showEmpty();
  toast('TP supprimé', 'success');
}

// ============================================================
// CONFIG
// ============================================================
function showConfigPanel() {
  document.getElementById('content').innerHTML = `
    <div class="detail-header">
      <div><div class="detail-title">Configuration</div></div>
    </div>

    <div class="config-section">
      <div class="config-title">🔑 Connexion GitHub Gist</div>
      <div style="display:flex;flex-direction:column;gap:12px;">
        <div class="form-group">
          <label>Token GitHub (Personal Access Token)</label>
          <input type="text" id="cfg-token-inline" value="${esc(config.token||'')}" placeholder="ghp_xxxxxxxxxxxx">
          <div class="text-muted mt8">Créer sur <strong>github.com → Settings → Developer settings → Personal access tokens → Fine-grained</strong> avec scope <code>gist</code></div>
        </div>
        <div class="form-group">
          <label>ID du Gist</label>
          <input type="text" id="cfg-gist-inline" value="${esc(config.gistId||'')}" placeholder="abc123def456...">
        </div>
        <div class="form-group">
          <label>URL de base de l'app élève</label>
          <input type="text" id="cfg-url-inline" value="${esc(config.appUrl||'')}" placeholder="https://exemple.github.io/melec-eleve.html">
          <div class="text-muted mt8">QR code généré : <code>[URL]?sys=[ID_SYSTEME]</code></div>
        </div>
        <div class="flex-end">
          <button class="btn btn-ghost" onclick="testGist()">🔄 Tester la connexion</button>
          <button class="btn btn-primary" onclick="saveConfigInline()">Enregistrer</button>
        </div>
      </div>
    </div>

    <div class="config-section">
      <div class="config-title">💾 Données locales</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <div class="stat-pill"><div class="stat-val">${state.systemes.length}</div><div class="stat-lbl">Systèmes</div></div>
        <div class="stat-pill"><div class="stat-val">${state.tps.length}</div><div class="stat-lbl">TPs</div></div>
        <div class="stat-pill"><div class="stat-val">${state.tps.reduce((a,t)=>a+(t.ressources||[]).length,0)}</div><div class="stat-lbl">Ressources</div></div>
      </div>
      <div style="display:flex;gap:8px;margin-top:14px;">
        <button class="btn btn-ghost btn-sm" onclick="exportJSON()">⬇️ Exporter JSON</button>
        <button class="btn btn-ghost btn-sm" onclick="importJSON()">⬆️ Importer JSON</button>
        <input type="file" id="import-file" accept=".json" style="display:none" onchange="handleImport(event)">
      </div>
    </div>
  `;
}

function saveConfigInline() {
  config.token = document.getElementById('cfg-token-inline').value.trim();
  config.gistId = document.getElementById('cfg-gist-inline').value.trim();
  config.appUrl = document.getElementById('cfg-url-inline').value.trim();
  localStorage.setItem('melec_tp_config', JSON.stringify(config));
  toast('Configuration enregistrée', 'success');
  loadGist();
}

function saveConfig() {
  config.token = document.getElementById('cfg-token').value.trim();
  config.gistId = document.getElementById('cfg-gist-id').value.trim();
  config.appUrl = document.getElementById('cfg-app-url').value.trim();
  localStorage.setItem('melec_tp_config', JSON.stringify(config));
  closeModal('modal-config');
  toast('Configuration enregistrée', 'success');
  loadGist();
}

async function testGist() {
  const token = document.getElementById('cfg-token-inline').value.trim();
  const gistId = document.getElementById('cfg-gist-inline').value.trim();
  if (!token || !gistId) { toast('Renseignez token et ID', 'error'); return; }
  setGistStatus('loading', 'Test...');
  try {
    const res = await fetch(`https://api.github.com/gists/${gistId}`, {
      headers: { Authorization: `token ${token}` }
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    setGistStatus('ok', 'Connecté');
    toast('Connexion Gist OK ✓', 'success');
  } catch(e) {
    setGistStatus('err', 'Erreur');
    toast('Erreur : ' + e.message, 'error');
  }
}

// ============================================================
// IMPORT / EXPORT
// ============================================================
function exportJSON() {
  const data = JSON.stringify({ systemes: state.systemes, tps: state.tps }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'melec-tp-data.json';
  a.click();
}

function importJSON() {
  document.getElementById('import-file').click();
}

function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if (d.systemes) state.systemes = d.systemes;
      if (d.tps) state.tps = d.tps;
      markDirty();
      renderSidebars();
      showConfigPanel();
      toast('Données importées', 'success');
    } catch(err) {
      toast('Erreur de lecture JSON', 'error');
    }
  };
  reader.readAsText(file);
}

// ============================================================
// HELPERS
// ============================================================
function showEmpty() {
  document.getElementById('content').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">🔌</div>
      <div class="empty-text">Sélectionnez un élément ou créez-en un nouveau</div>
    </div>
  `;
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function copyUrl(url) {
  navigator.clipboard.writeText(url).then(() => toast('URL copiée !', 'success'));
}

function toast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = (type === 'success' ? '✓ ' : '✕ ') + msg;
  el.className = 'toast show ' + type;
  setTimeout(() => el.classList.remove('show'), 3000);
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// ============================================================
// START
// ============================================================
init();
</script>
</body>
</html>
